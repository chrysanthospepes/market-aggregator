{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<form action="{% url 'set_language' %}" method="post" class="language-switcher" aria-label="{% trans 'Language switcher' %}">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">
  <button
    type="submit"
    name="language"
    value="en"
    aria-pressed="{% if CURRENT_LANGUAGE == 'en' %}true{% else %}false{% endif %}"
  >
    EN
  </button>
  <button
    type="submit"
    name="language"
    value="el"
    aria-pressed="{% if CURRENT_LANGUAGE == 'el' %}true{% else %}false{% endif %}"
  >
    EL
  </button>
</form>
